# CRE Secrets Configuration
# These map CRE secret IDs to the external secret values.
# For local simulation, values are sourced from .env instead.
# For production deployment, register secrets via: cre secrets set
#
# Currently goal.live uses config.json for non-sensitive keys.
# Only the private key (CRE_ETH_PRIVATE_KEY) is truly secret — it lives in .env.
secretNames: {}
